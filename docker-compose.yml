services:
  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    container_name: maenews-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    networks:
      - maenews-network

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: maenews-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://backend:8080/api/v1}
      NEXT_PUBLIC_USER_API_BASE_URL: ${NEXT_PUBLIC_USER_API_BASE_URL:-http://backend:8080/api/v1}
      NEXT_PUBLIC_API_MODE: ${NEXT_PUBLIC_API_MODE:-live}
    depends_on:
      - backend
    volumes:
      - ./services/frontend:/app
      - frontend-node-modules:/app/node_modules
      - frontend-next-cache:/app/.next
    networks:
      - maenews-network

  nettools:
    build:
      context: ./services/nettools
      dockerfile: Dockerfile
    container_name: maenews-nettools
    restart: "no"
    stdin_open: true
    tty: true
    networks:
      - maenews-network

volumes:
  backend-data:
  backend-uploads:
  frontend-node-modules:
  frontend-next-cache:

networks:
  maenews-network:
    driver: bridge
