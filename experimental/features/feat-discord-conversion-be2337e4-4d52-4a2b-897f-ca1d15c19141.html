    <div class="relative z-10">

      <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 mb-4 tracking-tight">
        Masuk Circle Kami!
      </h1>

      <p class="text-gray-300 text-lg mb-8 leading-relaxed">
        Jadilah bagian dari komunitas <span class="font-semibold text-white">AniMae</span>. Dapatkan info pop culture Jepang terbaru, akses presale tiket, dan ngobrol bareng sesama kreator!
      </p>

      <div class="space-y-4">
        <a href="#discord" class="group relative flex w-full justify-center items-center px-6 py-4 text-sm font-semibold text-white bg-indigo-600 rounded-xl hover:bg-indigo-500 transition-all duration-200 overflow-hidden shadow-lg shadow-indigo-600/20 hover:shadow-indigo-500/40">
          <span class="absolute w-0 h-0 transition-all duration-500 ease-out bg-white rounded-full group-hover:w-56 group-hover:h-56 opacity-10"></span>
          <span class="relative">Join Server Discord Sekarang</span>
        </a>
        <p class="text-sm text-gray-500">Udah ada 10,000+ member nungguin kamu!</p>
      </div>

      <div class="mt-8 flex items-center justify-center space-x-3 text-sm text-gray-400">
        <div class="flex -space-x-2">
          <img class="inline-block h-8 w-8 rounded-full ring-2 ring-[#1e293b]" src="https://ui-avatars.com/api/?name=Cosplayer&background=6366f1&color=fff" alt="">
          <img class="inline-block h-8 w-8 rounded-full ring-2 ring-[#1e293b]" src="https://ui-avatars.com/api/?name=Musician&background=8b5cf6&color=fff" alt="">
          <img class="inline-block h-8 w-8 rounded-full ring-2 ring-[#1e293b]" src="https://ui-avatars.com/api/?name=Artist&background=ec4899&color=fff" alt="">
