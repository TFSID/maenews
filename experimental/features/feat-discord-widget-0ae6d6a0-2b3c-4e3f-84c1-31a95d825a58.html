<!DOCTYPE html>
<html lang="id">
<head>
    <!--
      Feature Name: Discord Conversion Widget
      Phase Served: Fase Jangka Pendek (Distribusi & Validasi)
      Purpose: Konversi pembaca menjadi anggota komunitas Discord (Top of the Funnel to Community)
      UUID: 0ae6d6a0-2b3c-4e3f-84c1-31a95d825a58
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Conversion Widget - MaeNews</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }
        .discord-bg {
            background-color: #5865F2;
        }
        .discord-hover:hover {
            background-color: #4752C4;
        }
        .pulse-dot {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
    </style>
</head>
<body>

    <!-- Widget Container -->
    <div class="w-full max-w-sm bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
        <!-- Banner / Header -->
        <div class="h-24 discord-bg relative">
            <div class="absolute inset-0 bg-black opacity-10"></div>
            <!-- Mock Banner Pattern -->
            <svg class="absolute inset-0 w-full h-full text-white opacity-20" fill="currentColor" viewBox="0 0 100 100" preserveAspectRatio="none">
                <polygon points="0,100 100,0 100,100"/>
            </svg>
        </div>

        <!-- Content -->
        <div class="px-6 pt-0 pb-6 relative">
            <!-- Server Icon -->
            <div class="w-20 h-20 bg-gray-900 rounded-2xl shadow-lg border-4 border-white flex items-center justify-center -mt-10 mb-3 relative z-10 overflow-hidden">
                <span class="text-white font-bold text-2xl tracking-wider">ANM</span>
            </div>

            <!-- Server Info -->
            <h2 class="text-xl font-bold text-gray-900 mb-1">AniMae Community</h2>
            <p class="text-sm text-gray-500 mb-4 line-clamp-2">
                Tempat ngumpul wibu, cosplayer, dan kreator kultur pop Jepang. Dapetin info event & ngobrol bareng di sini!
            </p>

            <!-- Stats -->
            <div class="flex items-center space-x-4 mb-6">
                <div class="flex items-center text-sm font-medium text-gray-700">
                    <span class="w-3 h-3 bg-green-500 rounded-full mr-2 pulse-dot"></span>
                    <span id="online-count">1,248</span> Online
                </div>
                <div class="flex items-center text-sm font-medium text-gray-700">
                    <span class="w-3 h-3 bg-gray-300 rounded-full mr-2"></span>
                    <span id="member-count">5,932</span> Members
                </div>
            </div>

            <!-- Action Button -->
            <a href="#" onclick="alert('Ini adalah prototipe. Aksi ini akan membuka invite Discord.'); return false;" class="block w-full text-center text-white discord-bg discord-hover font-semibold py-3 px-4 rounded-xl transition duration-200 ease-in-out transform hover:-translate-y-0.5 shadow-md">
                Join Server
            </a>

            <p class="text-xs text-center text-gray-400 mt-3">
                Gratis • Akses eksklusif konten @tfs_ind
            </p>
        </div>
    </div>

    <script>
        // Simple script to add a bit of dynamic feel to the numbers
        document.addEventListener("DOMContentLoaded", () => {
            const onlineElem = document.getElementById("online-count");
            let baseOnline = 1248;

            setInterval(() => {
                // Randomly fluctuate online members by -3 to +3
                const diff = Math.floor(Math.random() * 7) - 3;
                baseOnline += diff;
                onlineElem.textContent = baseOnline.toLocaleString('id-ID');
            }, 3000);
        });
    </script>
</body>
</html>
