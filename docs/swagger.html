<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maenews API — Swagger</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    html {
      box-sizing: border-box;
      overflow-y: scroll;
    }

    *,
    *::before,
    *::after {
      box-sizing: inherit;
    }

    body {
      margin: 0;
      background: #fafafa;
    }

    .topbar {
      display: none !important;
    }
  </style>
</head>

<body>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    // OpenAPI spec embedded inline — works from file:// and localhost
    const spec = {
      openapi: "3.0.3",
      info: {
        title: "Maenews API",
        description: "REST API untuk portal berita anime, manga, dan kultur pop Jepang — **Maenews**.\nAPI ini menyediakan endpoint untuk mengakses artikel, trending items, events, dan fitur pencarian.",
        version: "1.0.0",
        contact: { name: "Tim Animae", url: "https://animae.id" }
      },
      servers: [
        { url: "https://golang-maenews-animae-id2569-ksgm0g96.leapcell.dev/api/v1", description: "Production" },
        { url: "http://localhost:3000/api/v1", description: "Local Development" }
      ],
      tags: [
        { name: "Articles", description: "Operasi CRUD untuk artikel berita" },
        { name: "Trending", description: "Item yang sedang trending" },
        { name: "Events", description: "Event/acara mendatang" },
        { name: "Search", description: "Pencarian artikel" }
      ],
      paths: {
        "/articles": {
          get: {
            tags: ["Articles"],
            summary: "Get all articles",
            description: "Mengambil seluruh daftar artikel berita.",
            operationId: "getAllArticles",
            responses: {
              "200": {
                description: "Daftar artikel berhasil diambil",
                content: { "application/json": { schema: { type: "array", items: { $ref: "#/components/schemas/Article" } } } }
              },
              "500": { $ref: "#/components/responses/InternalError" }
            }
          }
        },
        "/articles/{slug}": {
          get: {
            tags: ["Articles"],
            summary: "Get article by slug",
            description: "Mengambil detail satu artikel berdasarkan slug URL.",
            operationId: "getArticleBySlug",
            parameters: [{ $ref: "#/components/parameters/SlugParam" }],
            responses: {
              "200": {
                description: "Detail artikel",
                content: { "application/json": { schema: { $ref: "#/components/schemas/Article" } } }
              },
              "404": { $ref: "#/components/responses/NotFound" },
              "500": { $ref: "#/components/responses/InternalError" }
            }
          }
        },
        "/articles/{slug}/view": {
          post: {
            tags: ["Articles"],
            summary: "Increment article view count",
            description: "Menambah jumlah view untuk artikel tertentu. Fire-and-forget.",
            operationId: "incrementArticleView",
            parameters: [{ $ref: "#/components/parameters/SlugParam" }],
            responses: {
              "204": { description: "View count berhasil ditambahkan" },
              "404": { $ref: "#/components/responses/NotFound" }
            }
          }
        },
        "/category/{categoryName}": {
          get: {
            tags: ["Articles"],
            summary: "Get articles by category",
            description: "Mengambil artikel berdasarkan nama kategori (slug format).",
            operationId: "getArticlesByCategory",
            parameters: [{
              name: "categoryName", in: "path", required: true,
              description: "Slug kategori (e.g. anime, manga, content-creator, game, cosplay)",
              schema: { type: "string", example: "anime" }
            }],
            responses: {
              "200": {
                description: "Daftar artikel dalam kategori",
                content: { "application/json": { schema: { type: "array", items: { $ref: "#/components/schemas/Article" } } } }
              },
              "500": { $ref: "#/components/responses/InternalError" }
            }
          }
        },
        "/tag/{tagName}": {
          get: {
            tags: ["Articles"],
            summary: "Get articles by tag",
            description: "Mengambil artikel berdasarkan nama tag (slug format).",
            operationId: "getArticlesByTag",
            parameters: [{
              name: "tagName", in: "path", required: true,
              description: "Slug tag (e.g. attack-on-titan, studio-ghibli)",
              schema: { type: "string", example: "one-piece" }
            }],
            responses: {
              "200": {
                description: "Daftar artikel dengan tag tersebut",
                content: { "application/json": { schema: { type: "array", items: { $ref: "#/components/schemas/Article" } } } }
              },
              "500": { $ref: "#/components/responses/InternalError" }
            }
          }
        },
        "/trending": {
          get: {
            tags: ["Trending"],
            summary: "Get trending items",
            description: "Mengambil daftar item yang sedang trending.",
            operationId: "getTrendingItems",
            responses: {
              "200": {
                description: "Daftar trending items",
                content: { "application/json": { schema: { type: "array", items: { $ref: "#/components/schemas/TrendingItem" } } } }
              },
              "500": { $ref: "#/components/responses/InternalError" }
            }
          }
        },
        "/events/upcoming": {
          get: {
            tags: ["Events"],
            summary: "Get upcoming events",
            description: "Mengambil daftar event/acara mendatang.",
            operationId: "getUpcomingEvents",
            responses: {
              "200": {
                description: "Daftar upcoming events",
                content: { "application/json": { schema: { type: "array", items: { $ref: "#/components/schemas/Event" } } } }
              },
              "500": { $ref: "#/components/responses/InternalError" }
            }
          }
        },
        "/events/{slug}": {
          get: {
            tags: ["Events"],
            summary: "Get event by slug",
            description: "Mengambil detail satu event berdasarkan slug.",
            operationId: "getEventBySlug",
            parameters: [{ $ref: "#/components/parameters/SlugParam" }],
            responses: {
              "200": {
                description: "Detail event",
                content: { "application/json": { schema: { $ref: "#/components/schemas/Event" } } }
              },
              "404": { $ref: "#/components/responses/NotFound" },
              "500": { $ref: "#/components/responses/InternalError" }
            }
          }
        },
        "/search/{query}": {
          get: {
            tags: ["Search"],
            summary: "Search articles",
            description: "Mencari artikel berdasarkan kata kunci di judul, excerpt, dan tags.",
            operationId: "searchArticles",
            parameters: [{
              name: "query", in: "path", required: true,
              description: "Kata kunci pencarian",
              schema: { type: "string", example: "demon slayer" }
            }],
            responses: {
              "200": {
                description: "Hasil pencarian",
                content: { "application/json": { schema: { type: "array", items: { $ref: "#/components/schemas/Article" } } } }
              },
              "500": { $ref: "#/components/responses/InternalError" }
            }
          }
        }
      },
      components: {
        parameters: {
          SlugParam: {
            name: "slug", in: "path", required: true,
            description: "URL-friendly identifier unik",
            schema: { type: "string", example: "attack-on-titan-final-season" }
          }
        },
        schemas: {
          Article: {
            type: "object",
            required: ["id", "title", "slug", "excerpt", "author", "publishedAt", "tags", "category"],
            properties: {
              id: { type: "string", example: "a2" },
              title: { type: "string", example: "Manga Penerus Attack on Titan, Fungus and Iron Diadaptasi ke anime!" },
              slug: { type: "string", example: "manga-penerus-attack-on-titan-fungus-iron-diadaptasi-anime" },
              excerpt: { type: "string", example: "Manga Fungus and Iron yang disebut sebagai penerus Attack on Titan akhirnya mendapatkan adaptasi anime." },
              description: { type: "string", description: "Ringkasan pendek (legacy)", example: "Manga penerus AOT diadaptasi ke anime..." },
              content: { type: "string", description: "Konten HTML lengkap untuk halaman detail", example: "<h3>Jakarta, Indonesia-</h3><p>Kabar baik bagi industri anime...</p>" },
              imageUrl: { type: "string", format: "uri", example: "/images/articles/Manga Penerus Attack on Titan, Fungus and Iron Diadaptasi ke anime!.png" },
              thumbnailUrl: { type: "string", format: "uri", description: "URL thumbnail alternatif (opsional)" },
              author: { type: "string", example: "TFS" },
              tags: { type: "array", items: { type: "string" }, example: ["Fungus and Iron", "Anime Adaptasi", "Attack on Titan"] },
              category: { type: "string", enum: ["Anime", "Creator", "Gaming", "Cosplay", "Event"], example: "Anime" },
              publishedAt: { type: "string", format: "date-time", example: "2026-03-07T10:00:00Z" },
              readTimeMinutes: { type: "integer", description: "Estimasi waktu baca (menit)", example: 5 },
              featured: { type: "boolean", example: false },
              views: { type: "integer", example: 6700 },
              shares: { type: "integer", example: 120 }
            }
          },
          TrendingItem: {
            type: "object",
            required: ["id", "title", "description", "slug", "category", "publishedAt"],
            properties: {
              id: { type: "string", example: "trending-1" },
              title: { type: "string", example: "Demon Slayer Season 4 Dikonfirmasi" },
              description: { type: "string", example: "Studio Ufotable mengumumkan kelanjutan anime fenomenal ini." },
              slug: { type: "string", example: "demon-slayer-season-4-dikonfirmasi" },
              category: { type: "string", example: "Anime" },
              publishedAt: { type: "string", format: "date-time", example: "2026-03-01T10:00:00Z" },
              imageUrl: { type: "string", format: "uri", description: "URL gambar trending item (opsional)" }
            }
          },
          Event: {
            type: "object",
            required: ["id", "title", "slug", "description", "thumbnailUrl", "location", "startDate", "endDate", "status", "organizer", "tags"],
            properties: {
              id: { type: "string", example: "evt-1" },
              title: { type: "string", example: "Comifuro 21" },
              slug: { type: "string", example: "comifuro-21" },
              description: { type: "string", example: "Event doujin dan indie creator terbesar di Indonesia." },
              thumbnailUrl: { type: "string", format: "uri", example: "https://placehold.co/400x300/7C2D12/FFFFFF?text=Comifuro+21" },
              location: { type: "string", example: "ICE BSD, Tangerang" },
              startDate: { type: "string", format: "date-time", example: "2026-04-12T09:00:00Z" },
              endDate: { type: "string", format: "date-time", example: "2026-04-13T18:00:00Z" },
              status: { type: "string", enum: ["upcoming", "ongoing", "ended"], example: "upcoming" },
              organizer: { type: "string", example: "Creative Hub Indonesia" },
              tags: { type: "array", items: { type: "string" }, example: ["Comifuro", "Convention", "Doujin"] }
            }
          },
          ErrorResponse: {
            type: "object",
            properties: {
              message: { type: "string", example: "Resource not found" },
              status: { type: "integer", example: 404 }
            }
          }
        },
        responses: {
          NotFound: {
            description: "Resource tidak ditemukan",
            content: { "application/json": { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
          },
          InternalError: {
            description: "Internal server error",
            content: { "application/json": { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
          }
        }
      }
    };

    SwaggerUIBundle({
      spec: spec,
      dom_id: "#swagger-ui",
      deepLinking: true,
      presets: [
        SwaggerUIBundle.presets.apis,
        SwaggerUIBundle.SwaggerUIStandalonePreset,
      ],
      layout: "BaseLayout",
    });
  </script>
</body>

</html>
